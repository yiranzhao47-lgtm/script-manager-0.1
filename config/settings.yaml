# ══════════════════════════════════════════════════════════════════════════════
#  cc_script_manager — Pipeline Configuration
# ══════════════════════════════════════════════════════════════════════════════

# ── Global pipeline switch ────────────────────────────────────────────────────
pipeline:
  mode: "same_lang"         # "same_lang" | "cross_lang"
                            # same_lang  : audio language == subtitle language (ASR master)
                            # cross_lang : Chinese audio + foreign subtitles (OCR master)
  source_language: "en"     # "zh" (default) | "en" | other ISO-639-1 code
                            # Drives ASR language, output subdir name, prompt selection,
                            # and auto-disables translation when source is already English.

# ── same_lang mode (中配中字) ──────────────────────────────────────────────────
same_lang:
  asr:
    model: "large-v3"       # stable-whisper model name
    device: "cuda"          # "cuda" | "cpu"
    compute_type: "float16" # faster-whisper precision: "float16" | "int8" | "float32"
    language: "zh"          # Whisper language code — "zh" for Chinese, "en" for English
    watermark_patterns: []  # platform intro/outro phrases to suppress
    hallucination:
      max_segment_duration_sec: 8.0   # segments longer than this are dropped (Whisper fills silence with hallucinations; real dialogue rarely exceeds 4-5 s)
      min_avg_probability: 0.50       # segment avg_probability below this → flagged as hallucination_risk
      word_low_conf_threshold: 0.40   # per-word probability below this → word flagged as low_confidence
  ocr:
    fps: 1                  # frames per second sampled for OCR (ASR is master; 1 FPS covers any subtitle ≥1 s)
    roi: [0.662, 0.814]  # [y_start_ratio, y_end_ratio] of frame height (subtitle band)
    language: "ch"          # PaddleOCR language code — "ch" for Chinese, "en" for English
    use_gpu: true
    min_line_confidence: 0.50   # discard OCR text boxes with confidence below this value
  alignment:
    min_overlap_abs_sec: 0.5      # absolute overlap threshold (seconds)
    min_overlap_ratio: 0.40       # relative threshold: overlap / ASR_duration
    min_asr_duration_sec: 0.2     # ASR segments shorter than this skip OCR binding
    asr_sparse_rescue: true       # use OCR blocks as master when ASR is too sparse
    asr_min_segments: 10          # trigger rescue if ASR has fewer than this many segments
    rescue_dedup_sim_threshold: 0.80  # SequenceMatcher ratio to merge near-duplicate OCR rescue blocks
    rescue_dedup_gap_sec: 0.6         # max gap (s) between adjacent blocks eligible for rescue dedup

# ── cross_lang mode (中配英字 / 外语译制) ─────────────────────────────────────
cross_lang:
  asr:
    role: "semantic_anchor"       # "semantic_anchor" | "disabled"
                                  # semantic_anchor: Chinese audio anchors English OCR correction
    model: "large-v3"
    device: "cuda"
    compute_type: "float16"
  ocr:
    fps: 5                        # higher FPS to catch every subtitle cut
    roi: [0.80, 0.95]
    language: "en"
    use_gpu: true
    min_line_confidence: 0.50     # discard OCR text boxes with confidence below this value
  dedup:
    similarity_threshold: 0.85    # SequenceMatcher ratio to treat frames as same subtitle
    min_segment_duration_sec: 0.4 # discard OCR segments shorter than this (fade artifacts)
    normalize_before_compare: true # strip tags/symbols/case before similarity calc
    fade_conf_floor: 0.55         # OCR detections below this treated as fade/transition frame (extend time, ignore text)

# ── MapReduce entity extraction ───────────────────────────────────────────────
metadata:
  map_batch_size: 20              # episodes per Map-phase LLM batch
  reduce_llm_canonicalize: true   # 5th LLM call: same-phonetic + OCR-typo merging
  cross_lang_name_mapping: true   # extract zh-audio ↔ en-subtitle character name pairs

# ── Execution layer (LLM refinement) ─────────────────────────────────────────
execution:
  llm:
    model: "deepseek-chat"         # any OpenAI-compatible model identifier
    base_url: "https://api.deepseek.com"  # null = use default OpenAI endpoint; set for custom
    api_key_env: "DEEPSEEK_API_KEY" # environment variable holding the API key
    max_tokens: 8000              # max completion tokens per episode LLM call

  # Claude config — used by TranslationMatrix Track A (English refinement)
  # OpenRouter provides an OpenAI-compatible endpoint; provider stays "openai"
  llm_claude:
    model: "anthropic/claude-sonnet-4-5"   # OpenRouter model ID
    provider: "openai"                      # OpenRouter is OAI-compatible
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    max_tokens: 8000
  token_budget:
    warn_tokens: 50000            # log WARNING when estimated input exceeds this
    limit_tokens: 100000          # log ERROR when estimated input exceeds this (still proceeds)
  prompts:
    same_lang: "refine_same_lang.j2"
    cross_lang: "refine_cross_lang.j2"
    map_extract: "map_extract.j2"
    reduce_canonicalize: "reduce_canonicalize.j2"
  retry:
    max_attempts: 5
    wait_min_sec: 1
    wait_max_sec: 60
    no_retry_codes: [400, 401]    # never retry auth / malformed-request errors

# ── GPU memory management ─────────────────────────────────────────────────────
gpu:
  enforce_sequential: true        # refuse to load two models simultaneously
  process_isolation: false        # true = each model in a subprocess (safer, slower)

# ── Language pre-flight detection ─────────────────────────────────────────────
lang_detection:
  episodes_to_check: 3            # inspect first N episodes
  frames_per_episode: 15          # random frames sampled per episode
  cjk_ratio_threshold: 0.30       # fraction of CJK chars that means "Chinese dominant"
  fatal_on_mismatch: true         # abort pipeline on mode / video-language conflict

# ── File system paths ─────────────────────────────────────────────────────────
# When a drama_name is passed on the CLI (e.g. python pipeline.py "dollar baby"),
# all four paths below are auto-derived and these values are IGNORED:
#   raw_video_dir  → data/raw/<drama_name>/
#   cache_dir      → data/cache/<drama_name>/       (per-drama isolated)
#   meta_dir       → data/meta/<drama_name>/        (per-drama isolated)
#   output_dir     → data/output/<drama_name>/
# These values only act as fallback when pipeline.py is called with no arguments.
paths:
  raw_video_dir: "data/raw/dollar baby"          # fallback: source video files
  cache_dir: "data/cache/dollar baby"            # fallback: intermediate cache
  meta_dir: "data/meta/dollar baby"              # fallback: meta_raw.json + meta.json
  output_dir: "data/output/dollar baby"          # fallback: show-specific output root

# ── Layer 5 Intelligence — drama rhythm analysis ─────────────────────────────
intelligence:
  drama_analysis:
    enabled: true               # set to true to run rhythm analysis after refinement
    map_workers: 4              # parallel LLM workers for the map phase
    map_max_tokens: 6000        # max completion tokens per episode analysis call
    reduce_max_tokens: 8000     # max completion tokens for the global blueprint call
    srt_char_limit: 15000       # truncate SRT content to this char limit before sending

  # ── Paywall report scene compression range ───────────────────────────────────
  paywall:
    scene_ep_range_start: 1    # first episode included in scene compression feed (1-based)
    scene_ep_range_end: 26     # last episode (exclusive) — episodes [start, end) are sent to Claude

  # ── Multi-language translation matrix (run with: python pipeline.py --translate-only) ─
  translation:
    enabled: true               # master switch; --translate-only still respects this
                                # Note: auto-disabled when pipeline.source_language == "en"
    target_languages: ["fr", "es"]    # French + Spanish produced alongside English by default
    genre_glossary_path: "data/meta/fantasy_glossary.json"  # optional; silently skipped if missing

  # ── Marketing clip generation (Stage 6) ──────────────────────────────────────
  creatives:
    enabled: true              # auto-run extract→plan→assemble after drama analysis
    tail_freeze_sec: 2.5       # freeze-frame seconds appended after the last subtitle cut
    tail_audio_fade_sec: 1.0   # audio fade-out duration at the end of the freeze tail

# ── FinOps pricing (unit: CNY / million tokens) ───────────────────────────────
# Claude rates assume ¥7.25/USD; update if exchange rate shifts significantly.
pricing:
  deepseek-chat:
    input_cost_per_m:  1.0        # ¥1.00 per 1 M input tokens
    output_cost_per_m: 2.0        # ¥2.00 per 1 M output tokens
  "anthropic/claude-sonnet-4-5":
    input_cost_per_m:  21.75      # $3.00/M × ¥7.25/$ (via OpenRouter)
    output_cost_per_m: 108.75     # $15.00/M × ¥7.25/$ (via OpenRouter)
